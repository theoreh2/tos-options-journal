# Optional: Local Postgres for offline development
# Since you have Supabase hosted, this is only needed for offline work
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: options_journal
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d options_journal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
